<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BellaBot — AI Ordering Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 420px;
            height: 680px;
            background: #1e1e2e;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .header {
            background: linear-gradient(135deg, #e63946 0%, #d62828 100%);
            color: white;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            font-size: 2em;
        }

        .header-text h1 {
            font-size: 1.2em;
            font-weight: 700;
        }

        .header-text p {
            font-size: 0.75em;
            opacity: 0.85;
        }

        .header-right {
            margin-left: auto;
            text-align: right;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.7em;
            justify-content: flex-end;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .order-badge {
            background: rgba(255,255,255,0.2);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7em;
            margin-top: 4px;
            display: inline-block;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #1e1e2e;
        }

        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .message {
            max-width: 85%;
            padding: 11px 15px;
            border-radius: 16px;
            font-size: 0.88em;
            line-height: 1.45;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bot-message {
            background: #2a2a3e;
            color: #e0e0e0;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .user-message {
            background: linear-gradient(135deg, #e63946 0%, #d62828 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 11px 15px;
            background: #2a2a3e;
            border-radius: 16px;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .typing span {
            width: 7px;
            height: 7px;
            background: #555;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            padding: 0 16px 8px;
            background: #1e1e2e;
        }

        .quick-reply {
            padding: 7px 14px;
            background: transparent;
            border: 1px solid #e63946;
            color: #e63946;
            border-radius: 18px;
            cursor: pointer;
            font-size: 0.78em;
            transition: all 0.2s;
        }

        .quick-reply:hover {
            background: #e63946;
            color: white;
        }

        .menu-card {
            background: #2a2a3e;
            border-radius: 12px;
            padding: 14px;
            margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .menu-category {
            color: #e63946;
            font-weight: 700;
            font-size: 0.85em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.84em;
            color: #ccc;
            cursor: pointer;
            transition: color 0.2s;
        }

        .menu-item:hover { color: #e63946; }
        .menu-item:last-child { border-bottom: none; }

        .menu-price {
            color: #e63946;
            font-weight: 600;
            font-size: 0.9em;
        }

        .order-summary {
            background: #2a2a3e;
            border: 1px solid #e63946;
            border-radius: 12px;
            padding: 14px;
            margin-top: 8px;
        }

        .order-summary h3 {
            color: #e63946;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .order-line {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.82em;
            color: #ccc;
        }

        .order-total {
            display: flex;
            justify-content: space-between;
            padding: 8px 0 0;
            margin-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-weight: 700;
            color: white;
            font-size: 0.95em;
        }

        .confirmation {
            background: #1a3a1a;
            border: 1px solid #4ade80;
            border-radius: 12px;
            padding: 18px;
            margin-top: 8px;
            text-align: center;
        }

        .confirmation h3 {
            color: #4ade80;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .confirmation p {
            color: #a0d0a0;
            font-size: 0.85em;
            margin: 4px 0;
        }

        .confirmation .order-id {
            color: #4ade80;
            font-weight: 700;
            font-size: 1.2em;
            margin-top: 10px;
        }

        .input-area {
            display: flex;
            padding: 12px 16px;
            background: #252538;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .input-area input {
            flex: 1;
            padding: 11px 15px;
            background: #1e1e2e;
            border: 1px solid #333;
            border-radius: 22px;
            outline: none;
            font-size: 0.88em;
            color: white;
        }

        .input-area input::placeholder { color: #666; }
        .input-area input:focus { border-color: #e63946; }

        .input-area button {
            margin-left: 10px;
            padding: 11px 18px;
            background: linear-gradient(135deg, #e63946 0%, #d62828 100%);
            color: white;
            border: none;
            border-radius: 22px;
            cursor: pointer;
            font-size: 0.88em;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .input-area button:hover { transform: scale(1.05); }

        .powered-by {
            text-align: center;
            padding: 6px;
            font-size: 0.65em;
            color: #555;
            background: #252538;
        }

        .size-selector {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .size-option {
            flex: 1;
            padding: 10px;
            background: #1e1e2e;
            border: 1px solid #e63946;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .size-option:hover, .size-option.selected {
            background: #e63946;
            color: white;
        }

        .size-option .size-name {
            font-size: 0.8em;
            font-weight: 600;
            color: inherit;
        }

        .size-option .size-price {
            font-size: 0.75em;
            opacity: 0.8;
            margin-top: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">🍕</div>
            <div class="header-text">
                <h1>Bella's Pizzeria</h1>
                <p>AI Ordering Assistant</p>
            </div>
            <div class="header-right">
                <div class="status">
                    <div class="status-dot"></div>
                    Open Now
                </div>
                <div class="order-badge" id="orderBadge">Cart: empty</div>
            </div>
        </div>

        <div class="chat-area" id="chatArea"></div>
        <div class="quick-replies" id="quickReplies"></div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
        <div class="powered-by">Powered by AI ✦ Built by Vibecoding</div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const quickRepliesDiv = document.getElementById('quickReplies');
        const orderBadge = document.getElementById('orderBadge');

        let state = 'greeting';
        let cart = [];
        let currentItem = null;
        let customerName = '';

        const menu = {
            'Pizzas': [
                { name: 'Margherita', desc: 'Fresh mozzarella, basil, tomato', sm: 12, md: 16, lg: 20 },
                { name: 'Pepperoni', desc: 'Classic pepperoni, mozzarella', sm: 14, md: 18, lg: 22 },
                { name: 'BBQ Chicken', desc: 'Grilled chicken, BBQ sauce, onions', sm: 15, md: 19, lg: 24 },
                { name: 'Veggie Supreme', desc: 'Peppers, mushrooms, olives, onions', sm: 13, md: 17, lg: 21 },
                { name: 'Meat Lovers', desc: 'Pepperoni, sausage, bacon, ham', sm: 16, md: 20, lg: 25 },
            ],
            'Sides': [
                { name: 'Garlic Bread', price: 6 },
                { name: 'Mozzarella Sticks', price: 8 },
                { name: 'Caesar Salad', price: 9 },
                { name: 'Buffalo Wings (12pc)', price: 14 },
            ],
            'Drinks': [
                { name: 'Soda (Can)', price: 2 },
                { name: 'Fresh Lemonade', price: 4 },
                { name: 'Iced Tea', price: 3 },
                { name: 'Water Bottle', price: 2 },
            ],
            'Desserts': [
                { name: 'Tiramisu', price: 8 },
                { name: 'Cannoli (2pc)', price: 6 },
                { name: 'Chocolate Lava Cake', price: 9 },
            ]
        };

        function addMessage(text, isUser = false, isHTML = false) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            isHTML ? div.innerHTML = text : div.textContent = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typing';
            div.innerHTML = '<span></span><span></span><span></span>';
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function hideTyping() {
            const t = document.getElementById('typing');
            if (t) t.remove();
        }

        function setQuickReplies(replies) {
            quickRepliesDiv.innerHTML = '';
            replies.forEach(r => {
                const btn = document.createElement('button');
                btn.className = 'quick-reply';
                btn.textContent = r;
                btn.onclick = () => { userInput.value = r; sendMessage(); };
                quickRepliesDiv.appendChild(btn);
            });
        }

        function botReply(text, delay = 800, isHTML = false) {
            showTyping();
            setTimeout(() => {
                hideTyping();
                addMessage(text, false, isHTML);
                handleState();
            }, delay);
        }

        function updateCartBadge() {
            const count = cart.length;
            const total = cart.reduce((s, i) => s + i.price, 0);
            orderBadge.textContent = count === 0 ? 'Cart: empty' : `Cart: ${count} items · $${total}`;
        }

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage(text, true);
            userInput.value = '';
            quickRepliesDiv.innerHTML = '';
            processInput(text);
        }

        userInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

        function processInput(text) {
            const lower = text.toLowerCase();

            if (state === 'greeting') {
                if (lower.includes('menu') || lower.includes('order') || lower.includes('yes') || lower.includes('food')) {
                    state = 'browse_menu';
                    botReply("Here's our menu! 🍕");
                } else if (lower.includes('hour') || lower.includes('open') || lower.includes('time')) {
                    botReply("We're open daily 11 AM - 10 PM! Delivery available until 9:30 PM. Ready to order?");
                    setQuickReplies(['See menu', 'Place order']);
                } else {
                    botReply("Welcome! Ready to order some delicious pizza? 🍕");
                    setQuickReplies(['See menu', 'Place order', 'Hours & location']);
                }
            }
            else if (state === 'browse_menu') {
                showFullMenu();
            }
            else if (state === 'pick_category') {
                if (lower.includes('pizza')) {
                    state = 'pick_pizza';
                    showCategory('Pizzas');
                } else if (lower.includes('side')) {
                    state = 'pick_side';
                    showCategory('Sides');
                } else if (lower.includes('drink')) {
                    state = 'pick_drink';
                    showCategory('Drinks');
                } else if (lower.includes('dessert')) {
                    state = 'pick_dessert';
                    showCategory('Desserts');
                } else if (lower.includes('done') || lower.includes('checkout') || lower.includes('cart')) {
                    if (cart.length === 0) {
                        botReply("Your cart is empty! Let me show you the menu first.");
                        state = 'browse_menu';
                    } else {
                        state = 'checkout_name';
                        botReply("Let's get your order confirmed! What name for the order?");
                    }
                } else {
                    botReply("What would you like? Pick a category:");
                    setQuickReplies(['🍕 Pizzas', '🧆 Sides', '🥤 Drinks', '🍰 Desserts', '✅ Checkout']);
                }
            }
            else if (state === 'pick_pizza') {
                const pizza = menu['Pizzas'].find(p => lower.includes(p.name.toLowerCase().split(' ')[0]));
                if (pizza) {
                    currentItem = { ...pizza, type: 'pizza' };
                    state = 'pick_size';
                    let html = `<div class="menu-card">`;
                    html += `<div class="menu-category">${pizza.name}</div>`;
                    html += `<p style="color:#aaa;font-size:0.82em;margin-bottom:10px">${pizza.desc}</p>`;
                    html += `<div class="size-selector">`;
                    html += `<div class="size-option" onclick="selectSize('sm', ${pizza.sm})"><div class="size-name">Small</div><div class="size-price">$${pizza.sm}</div></div>`;
                    html += `<div class="size-option" onclick="selectSize('md', ${pizza.md})"><div class="size-name">Medium</div><div class="size-price">$${pizza.md}</div></div>`;
                    html += `<div class="size-option" onclick="selectSize('lg', ${pizza.lg})"><div class="size-name">Large</div><div class="size-price">$${pizza.lg}</div></div>`;
                    html += `</div></div>`;
                    addMessage(html, false, true);
                    setQuickReplies(['Small', 'Medium', 'Large']);
                } else {
                    botReply("Which pizza catches your eye?");
                    showCategoryInline('Pizzas');
                }
            }
            else if (state === 'pick_size') {
                let size, price;
                if (lower.includes('small') || lower === 'sm') { size = 'Small'; price = currentItem.sm; }
                else if (lower.includes('medium') || lower === 'md') { size = 'Medium'; price = currentItem.md; }
                else if (lower.includes('large') || lower === 'lg') { size = 'Large'; price = currentItem.lg; }
                else { botReply("Pick a size: Small, Medium, or Large?"); setQuickReplies(['Small', 'Medium', 'Large']); return; }

                cart.push({ name: `${currentItem.name} (${size})`, price });
                updateCartBadge();
                state = 'pick_category';
                botReply(`Added! ${currentItem.name} ${size} — $${price} ✅\n\nAnything else?`);
                setQuickReplies(['🍕 More Pizzas', '🧆 Sides', '🥤 Drinks', '🍰 Desserts', '✅ Checkout']);
            }
            else if (state === 'pick_side' || state === 'pick_drink' || state === 'pick_dessert') {
                const cat = state === 'pick_side' ? 'Sides' : state === 'pick_drink' ? 'Drinks' : 'Desserts';
                const item = menu[cat].find(i => lower.includes(i.name.toLowerCase().split(' ')[0]));
                if (item) {
                    cart.push({ name: item.name, price: item.price });
                    updateCartBadge();
                    state = 'pick_category';
                    botReply(`Added! ${item.name} — $${item.price} ✅\n\nAnything else?`);
                    setQuickReplies(['🍕 Pizzas', '🧆 Sides', '🥤 Drinks', '🍰 Desserts', '✅ Checkout']);
                } else {
                    botReply(`Which ${cat.toLowerCase().slice(0, -1)} would you like?`);
                    showCategoryInline(cat);
                }
            }
            else if (state === 'checkout_name') {
                customerName = text;
                state = 'checkout_method';
                botReply(`Thanks ${customerName}! Pickup or delivery?`);
                setQuickReplies(['🚗 Pickup', '🏠 Delivery']);
            }
            else if (state === 'checkout_method') {
                const method = lower.includes('deliver') ? 'Delivery' : 'Pickup';
                state = 'confirmed';

                let html = '<div class="order-summary">';
                html += `<h3>📋 Order Summary</h3>`;
                cart.forEach(item => {
                    html += `<div class="order-line"><span>${item.name}</span><span>$${item.price}</span></div>`;
                });
                const subtotal = cart.reduce((s, i) => s + i.price, 0);
                const tax = Math.round(subtotal * 0.08 * 100) / 100;
                const delivery = method === 'Delivery' ? 5 : 0;
                const total = subtotal + tax + delivery;
                html += `<div class="order-line"><span>Tax</span><span>$${tax.toFixed(2)}</span></div>`;
                if (delivery > 0) html += `<div class="order-line"><span>Delivery</span><span>$5.00</span></div>`;
                html += `<div class="order-total"><span>Total</span><span>$${total.toFixed(2)}</span></div>`;
                html += '</div>';
                addMessage(html, false, true);

                const orderId = 'BL-' + Math.floor(1000 + Math.random() * 9000);
                const eta = method === 'Delivery' ? '35-45 min' : '15-20 min';
                let confHTML = `
                    <div class="confirmation">
                        <h3>✅ Order Confirmed!</h3>
                        <p><strong>${customerName}</strong> · ${method}</p>
                        <p>ETA: ${eta}</p>
                        <p class="order-id">${orderId}</p>
                        <p style="margin-top:8px;font-size:0.78em">You'll receive a text when it's ready!</p>
                    </div>
                `;
                setTimeout(() => addMessage(confHTML, false, true), 600);
                setTimeout(() => {
                    botReply("Enjoy your meal! 🍕 Need anything else?");
                    setQuickReplies(['New order', 'Thanks!']);
                }, 1200);
            }
            else if (state === 'confirmed') {
                if (lower.includes('new') || lower.includes('order')) {
                    cart = [];
                    customerName = '';
                    currentItem = null;
                    updateCartBadge();
                    state = 'browse_menu';
                    botReply("Fresh start! Here's the menu:");
                } else {
                    state = 'greeting';
                    cart = [];
                    updateCartBadge();
                    botReply("Thanks for ordering from Bella's! Buon appetito! 🍕👋");
                    setTimeout(() => setQuickReplies(['See menu', 'Place order']), 500);
                }
            }
        }

        function showFullMenu() {
            let html = '';
            for (const [cat, items] of Object.entries(menu)) {
                html += `<div class="menu-card">`;
                html += `<div class="menu-category">${cat === 'Pizzas' ? '🍕' : cat === 'Sides' ? '🧆' : cat === 'Drinks' ? '🥤' : '🍰'} ${cat}</div>`;
                items.forEach(item => {
                    const price = item.sm ? `S $${item.sm} / M $${item.md} / L $${item.lg}` : `$${item.price}`;
                    html += `<div class="menu-item"><span>${item.name}</span><span class="menu-price">${price}</span></div>`;
                });
                html += `</div>`;
            }
            addMessage(html, false, true);
            state = 'pick_category';
            setTimeout(() => {
                botReply("What sounds good? 🤤");
                setQuickReplies(['🍕 Pizzas', '🧆 Sides', '🥤 Drinks', '🍰 Desserts']);
            }, 400);
        }

        function showCategory(cat) {
            const emoji = cat === 'Pizzas' ? '🍕' : cat === 'Sides' ? '🧆' : cat === 'Drinks' ? '🥤' : '🍰';
            let html = `<div class="menu-card"><div class="menu-category">${emoji} ${cat}</div>`;
            menu[cat].forEach(item => {
                const price = item.sm ? `S $${item.sm} / M $${item.md} / L $${item.lg}` : `$${item.price}`;
                html += `<div class="menu-item"><span>${item.name}${item.desc ? '<br><small style="color:#888">' + item.desc + '</small>' : ''}</span><span class="menu-price">${price}</span></div>`;
            });
            html += '</div>';
            addMessage(html, false, true);
            setTimeout(() => {
                if (cat === 'Pizzas') {
                    botReply("Which pizza would you like?");
                    setQuickReplies(menu['Pizzas'].map(p => p.name));
                } else {
                    botReply(`Which ${cat.toLowerCase().slice(0, -1)}?`);
                    setQuickReplies(menu[cat].map(i => i.name));
                }
            }, 300);
        }

        function showCategoryInline(cat) {
            setQuickReplies(menu[cat].map(i => i.name));
        }

        function selectSize(size, price) {
            userInput.value = size;
            sendMessage();
        }

        function handleState() {
            if (state === 'browse_menu') {
                showFullMenu();
            }
        }

        // Greeting
        setTimeout(() => {
            addMessage("Hey there! 👋 Welcome to Bella's Pizzeria! I'm your ordering assistant. I can help you browse our menu and place an order for pickup or delivery! 🍕");
            setQuickReplies(['See menu', 'Place order', 'Hours & location']);
        }, 500);
    </script>
</body>
</html>
